<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Солнечный компас</title>
    <style>
        :root {
            --bg: #050505;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.45);
            --accent-sun: #ffd25f;
            --accent-glow: rgba(255, 210, 95, 0.4);
            --surface: rgba(255, 255, 255, 0.08);
            --surface-border: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: calc(env(safe-area-inset-top) + 20px) 24px calc(env(safe-area-inset-bottom) + 24px);
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body::before {
            content: "";
            position: absolute;
            width: 380px;
            height: 380px;
            background: radial-gradient(circle, rgba(255, 210, 95, 0.05) 0%, rgba(0,0,0,0) 70%);
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
        }

        /* --- СТАРТОВЫЙ ЭКРАН (PWA) --- */
        .start-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .start-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .start-btn {
            background: var(--surface);
            border: 1px solid var(--surface-border);
            color: var(--text-primary);
            padding: 18px 42px;
            border-radius: 100px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .start-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.18);
        }

        /* --- ВЕРХНИЙ БЛОК --- */
        .display-header {
            position: relative;
            z-index: 1;
            text-align: center;
            margin-top: 10px;
            min-height: 110px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .date-label {
            font-size: 18px;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: -0.2px;
            min-height: 24px;
        }

        .time-value {
            font-size: 72px;
            font-weight: 100;
            letter-spacing: -3px;
            line-height: 1;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
            margin-top: 4px;
            min-height: 72px;
        }

        .time-value.dots {
            font-size: 40px;
            font-weight: 200;
            letter-spacing: 6px;
            color: var(--text-secondary);
        }

        /* --- КОМПАС --- */
        .compass-viewport {
            position: relative;
            z-index: 1;
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .compass-viewport.locked {
            transform: scale(1.05);
        }

        .compass-svg {
            width: 100%;
            height: 100%;
            will-change: transform;
            transition: transform 0.1s linear;
        }

        .sun-marker {
            position: absolute;
            top: 10px;
            left: 50%;
            width: 16px;
            height: 16px;
            margin-left: -8px;
            background: var(--accent-sun);
            border-radius: 50%;
            box-shadow: 0 0 16px var(--accent-sun), 0 0 32px var(--accent-glow);
            z-index: 3;
            transition: opacity 0.3s ease;
            opacity: 0;
        }

        .sun-marker.active {
            opacity: 1;
        }

        .target-line {
            position: absolute;
            top: 26px;
            left: 50%;
            width: 1px;
            height: 124px;
            background: linear-gradient(to bottom, var(--accent-sun), rgba(255, 210, 95, 0));
            transform: translateX(-50%);
            z-index: 2;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .target-line.active {
            opacity: 0.6;
        }

        .center-dot {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--text-primary);
            border-radius: 50%;
            z-index: 4;
            opacity: 0.5;
        }

        /* --- НИЖНИЙ БЛОК: КНОПКА СПУСКА КАМЕРЫ --- */
        .footer-meta {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            width: 100%;
        }

        .shutter-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.85);
            background: transparent;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            transition: border-color 0.3s ease, transform 0.15s ease;
        }

        .shutter-btn:active {
            transform: scale(0.93);
        }

        .shutter-inner {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: #ffffff;
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        background-color 0.25s ease, 
                        border-radius 0.25s ease,
                        box-shadow 0.25s ease;
        }

        /* Зафиксированное состояние (Индикатор захвата кадра) */
        .shutter-btn.active {
            border-color: var(--accent-sun);
        }

        .shutter-btn.active .shutter-inner {
            background: var(--accent-sun);
            box-shadow: 0 0 20px var(--accent-glow);
            transform: scale(0.72);
            border-radius: 14px;
        }

        .location-name {
            font-size: 13px;
            font-weight: 400;
            color: var(--text-secondary);
            letter-spacing: 0.2px;
        }
    </style>
</head>
<body>

    <!-- Стартовый экран для авторизации датчиков -->
    <div class="start-overlay" id="startOverlay">
        <button class="start-btn" id="startBtn">Включить компас</button>
    </div>

    <!-- Заголовок и вычисленное время -->
    <div class="display-header">
        <div class="date-label" id="dateLabel">Наведитесь</div>
        <div class="time-value" id="timeValue"></div>
    </div>

    <!-- Визуальный компас -->
    <div class="compass-viewport" id="compassViewport">
        <div class="target-line" id="targetLine"></div>
        <div class="sun-marker" id="sunMarker"></div>
        <div class="center-dot"></div>
        
        <svg class="compass-svg" id="compassSvg" viewBox="0 0 300 300">
            <circle cx="150" cy="150" r="142" stroke="rgba(255,255,255,0.08)" stroke-width="1" fill="none"/>
            <circle cx="150" cy="150" r="125" stroke="rgba(255,255,255,0.04)" stroke-width="1" fill="none"/>
            <g id="ticksGroup"></g>
            <text x="150" y="42" fill="#ffd25f" font-size="13" font-weight="600" text-anchor="middle">N</text>
            <text x="262" y="154" fill="rgba(255,255,255,0.4)" font-size="13" font-weight="500" text-anchor="middle">E</text>
            <text x="150" y="268" fill="rgba(255,255,255,0.4)" font-size="13" font-weight="500" text-anchor="middle">S</text>
            <text x="38" y="154" fill="rgba(255,255,255,0.4)" font-size="13" font-weight="500" text-anchor="middle">W</text>
        </svg>
    </div>

    <!-- Кнопка спуска Фотокамеры -->
    <div class="footer-meta">
        <button class="shutter-btn" id="calcBtn" aria-label="Сделать замер">
            <div class="shutter-inner"></div>
        </button>
        <div class="location-name" id="locationLabel">Определение...</div>
    </div>

    <script>
        // Рендер рисок компаса
        const ticksGroup = document.getElementById('ticksGroup');
        for (let i = 0; i < 360; i += 5) {
            const isMajor = i % 30 === 0;
            const r1 = 142;
            const r2 = r1 - (isMajor ? 10 : 5);
            const rad = (i - 90) * Math.PI / 180;
            
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', 150 + r1 * Math.cos(rad));
            line.setAttribute('y1', 150 + r1 * Math.sin(rad));
            line.setAttribute('x2', 150 + r2 * Math.cos(rad));
            line.setAttribute('y2', 150 + r2 * Math.sin(rad));
            line.setAttribute('stroke', isMajor ? 'rgba(255,255,255,0.3)' : 'rgba(255,255,255,0.1)');
            line.setAttribute('stroke-width', isMajor ? '1.5' : '1');
            ticksGroup.appendChild(line);
        }

        // Элементы UI
        const dateLabel = document.getElementById('dateLabel');
        const timeValue = document.getElementById('timeValue');
        const locationLabel = document.getElementById('locationLabel');
        const compassSvg = document.getElementById('compassSvg');
        const compassViewport = document.getElementById('compassViewport');
        const sunMarker = document.getElementById('sunMarker');
        const targetLine = document.getElementById('targetLine');
        const calcBtn = document.getElementById('calcBtn');
        const startOverlay = document.getElementById('startOverlay');
        const startBtn = document.getElementById('startBtn');

        // Переменные состояния
        let userLat = null;
        let userLon = null;
        let currentHeading = 0;
        let lastRawHeading = 0;
        let unwrappedHeading = 0;
        let lastCalculatedHeading = null;
        let isLocked = false;

        // Инициализация датчиков
        startBtn.addEventListener('click', async () => {
            startBtn.textContent = 'Подключение...';
            startBtn.style.pointerEvents = 'none';

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const state = await DeviceOrientationEvent.requestPermission();
                    if (state === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation, true);
                    } else {
                        alert('Доступ к компасу запрещен');
                        return;
                    }
                } catch (e) {
                    console.error(e);
                }
            } else {
                window.addEventListener('deviceorientation', handleOrientation, true);
            }

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => {
                        userLat = pos.coords.latitude;
                        userLon = pos.coords.longitude;
                        reverseGeocode(userLat, userLon);
                        startOverlay.classList.add('hidden');
                    },
                    err => {
                        userLat = 55.7558;
                        userLon = 37.6173;
                        locationLabel.textContent = 'Москва (Демо)';
                        startOverlay.classList.add('hidden');
                    },
                    { enableHighAccuracy: true, timeout: 6000 }
                );
            }
        });

        // Астрономия (NOAA Solar Algorithm)
        const toRad = d => d * Math.PI / 180;
        const toDeg = r => r * 180 / Math.PI;
        function getJulianDate(date) { return (date.getTime() / 1000 / 86400.0) + 2440587.5; }

        function getSolarPosition(jd, lat, lon) {
            const d = jd - 2451545.0;
            const g = (357.529 + 0.98560028 * d) % 360;
            const q = (280.459 + 0.98564736 * d) % 360;
            const L = (q + 1.915 * Math.sin(toRad(g)) + 0.020 * Math.sin(toRad(2 * g))) % 360;
            const e = 23.439 - 0.00000036 * d;

            const alpha = toDeg(Math.atan2(Math.cos(toRad(e)) * Math.sin(toRad(L)), Math.cos(toRad(L))));
            const delta = toDeg(Math.asin(Math.sin(toRad(e)) * Math.sin(toRad(L))));

            const gmst = (280.46061837 + 360.98564736629 * d) % 360;
            let hourAngle = (gmst + lon - alpha) % 360;
            hourAngle = (hourAngle + 360) % 360;

            const sinAlt = Math.sin(toRad(lat)) * Math.sin(toRad(delta)) +
                Math.cos(toRad(lat)) * Math.cos(toRad(delta)) * Math.cos(toRad(hourAngle));
            const altitude = toDeg(Math.asin(Math.max(-1, Math.min(1, sinAlt))));

            let azimuth = toDeg(Math.atan2(
                -Math.sin(toRad(hourAngle)),
                Math.cos(toRad(lat)) * Math.tan(toRad(delta)) - Math.sin(toRad(lat)) * Math.cos(toRad(hourAngle))
            ));
            return { azimuth: (azimuth + 360) % 360, altitude };
        }

        function findSolarPassage(targetAzimuth, lat, lon) {
            const now = new Date();
            const startJd = getJulianDate(now);

            for (let day = 0; day < 365; day++) {
                const dayJd = startJd + day;
                for (let h = 0; h < 24; h += 1) {
                    const jd = dayJd + (h / 24);
                    const pos = getSolarPosition(jd, lat, lon);
                    if (pos.altitude > 0) {
                        let dAz = Math.abs(pos.azimuth - targetAzimuth);
                        if (Math.min(dAz, 360 - dAz) < 7.5) {
                            return refinePassage(jd - (1/24), jd + (1/24), targetAzimuth, lat, lon);
                        }
                    }
                }
            }
            return null;
        }

        function refinePassage(lo, hi, targetAzimuth, lat, lon) {
            for (let i = 0; i < 12; i++) {
                const mid = (lo + hi) / 2;
                const pMid = getSolarPosition(mid, lat, lon);
                let dMid = Math.abs(pMid.azimuth - targetAzimuth);
                if (dMid > 180) dMid = 360 - dMid;

                const pLo = getSolarPosition(lo, lat, lon);
                let dLo = Math.abs(pLo.azimuth - targetAzimuth);
                if (dLo > 180) dLo = 360 - dLo;

                dLo < dMid ? (hi = mid) : (lo = mid);
            }
            return new Date(((lo + hi) / 2 - 2440587.5) * 86400 * 1000);
        }

        function formatResult(date) {
            if (!date) return { dateStr: 'Вне орбиты', timeStr: '—' };
            const diffDays = Math.floor((date.setHours(0,0,0,0) - new Date().setHours(0,0,0,0)) / 86400000);
            const timeStr = date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });

            if (diffDays === 0) return { dateStr: 'Сегодня', timeStr };
            if (diffDays === 1) return { dateStr: 'Завтра', timeStr };
            return { dateStr: date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' }), timeStr };
        }

        // Ориентация
        function handleOrientation(e) {
            let heading = e.webkitCompassHeading || (e.alpha !== null ? 360 - e.alpha : null);
            if (heading !== null) {
                requestAnimationFrame(() => onHeadingChange((heading + 360) % 360));
            }
        }

        function onHeadingChange(heading) {
            let diff = heading - lastRawHeading;
            if (diff < -180) diff += 360;
            if (diff > 180) diff -= 360;
            unwrappedHeading += diff;
            lastRawHeading = heading;
            currentHeading = heading;

            compassSvg.style.transform = `rotate(${-unwrappedHeading}deg)`;
            sunMarker.style.transform = `translateX(-50%) rotate(${unwrappedHeading}deg)`;

            // Автосброс при повороте телефона более чем на 2.5 градуса
            if (isLocked && lastCalculatedHeading !== null) {
                let delta = Math.abs(currentHeading - lastCalculatedHeading);
                delta = Math.min(delta, 360 - delta);
                if (delta > 2.5) {
                    resetLock();
                }
            }
        }

        function resetLock() {
            isLocked = false;
            compassViewport.classList.remove('locked');
            sunMarker.classList.remove('active');
            targetLine.classList.remove('active');
            calcBtn.classList.remove('active');
            dateLabel.textContent = 'Наведитесь';
            timeValue.textContent = '';
            timeValue.classList.remove('dots');
        }

        function executeCalculation() {
            if (userLat === null) return;

            isLocked = true;
            lastCalculatedHeading = currentHeading;

            dateLabel.textContent = '';
            timeValue.textContent = '···';
            timeValue.classList.add('dots');

            setTimeout(() => {
                const passageDate = findSolarPassage(currentHeading, userLat, userLon);
                const { dateStr, timeStr } = formatResult(passageDate);

                dateLabel.textContent = dateStr;
                timeValue.classList.remove('dots');
                timeValue.textContent = timeStr;

                compassViewport.classList.add('locked');
                sunMarker.classList.add('active');
                targetLine.classList.add('active');

                calcBtn.classList.add('active');
            }, 120);
        }

        // События клика
        calcBtn.addEventListener('click', () => {
            if (isLocked) resetLock();
            else executeCalculation();
        });

        compassViewport.addEventListener('click', () => {
            if (isLocked) resetLock();
            else executeCalculation();
        });

        function reverseGeocode(lat, lon) {
            locationLabel.textContent = `${lat.toFixed(2)}°, ${lon.toFixed(2)}°`;
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=ru`)
                .then(r => r.json())
                .then(data => {
                    const city = data.address.city || data.address.town || data.address.settlement;
                    if (city) locationLabel.textContent = city;
                }).catch(() => {});
        }
    </script>
</body>
</html>
