<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Солнечный компас</title>
    <style>
        :root {
            --bg: #050505;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.4);
            --accent-sun: #ffd25f;
            --accent-glow: rgba(255, 210, 95, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: calc(env(safe-area-inset-top) + 24px) 24px calc(env(safe-area-inset-bottom) + 24px);
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body::before {
            content: "";
            position: absolute;
            width: 380px;
            height: 380px;
            background: radial-gradient(circle, rgba(255, 210, 95, 0.05) 0%, rgba(0,0,0,0) 70%);
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
        }

        /* --- СТАРТОВЫЙ ЭКРАН (PWA FIX) --- */
        .start-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease, backdrop-filter 0.6s ease;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .start-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .start-icon {
            font-size: 48px;
            margin-bottom: 24px;
            opacity: 0.9;
        }

        .start-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text-primary);
            padding: 16px 36px;
            border-radius: 100px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            margin-bottom: 16px;
        }

        .start-btn:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.15);
        }

        .start-hint {
            font-size: 13px;
            color: var(--text-secondary);
            text-align: center;
            max-width: 220px;
            line-height: 1.4;
        }

        /* --- ОСНОВНОЙ ИНТЕРФЕЙС --- */
        .display-header {
            position: relative;
            z-index: 1;
            text-align: center;
            margin-top: 10px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .date-label {
            font-size: 18px;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: -0.2px;
            min-height: 24px;
            transition: opacity 0.3s ease;
        }

        .time-value {
            font-size: 76px;
            font-weight: 100;
            letter-spacing: -3px;
            line-height: 1;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
            margin-top: 4px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
        }

        .time-value.dots {
            font-size: 48px;
            font-weight: 200;
            letter-spacing: 6px;
            color: var(--text-secondary);
        }

        .compass-viewport {
            position: relative;
            z-index: 1;
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .compass-viewport.locked {
            transform: scale(1.04);
        }

        .compass-svg {
            width: 100%;
            height: 100%;
            will-change: transform;
            transition: transform 0.1s linear;
        }

        .sun-marker {
            position: absolute;
            top: 10px;
            left: 50%;
            width: 16px;
            height: 16px;
            margin-left: -8px;
            background: var(--accent-sun);
            border-radius: 50%;
            box-shadow: 0 0 16px var(--accent-sun), 0 0 32px var(--accent-glow);
            z-index: 3;
            transition: opacity 0.3s ease, transform 0.1s linear;
            opacity: 0;
        }

        .sun-marker.active {
            opacity: 1;
        }

        .target-line {
            position: absolute;
            top: 26px;
            left: 50%;
            width: 1px;
            height: 124px;
            background: linear-gradient(to bottom, var(--accent-sun), rgba(255, 210, 95, 0));
            transform: translateX(-50%);
            z-index: 2;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .target-line.active {
            opacity: 0.6;
        }

        .center-dot {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--text-primary);
            border-radius: 50%;
            z-index: 4;
            opacity: 0.5;
        }

        .footer-meta {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .location-name {
            font-size: 15px;
            font-weight: 400;
            color: var(--text-secondary);
            letter-spacing: 0.2px;
        }
    </style>
</head>
<body>

    <!-- Стартовый экран для инициализации сенсоров -->
    <div class="start-overlay" id="startOverlay">
        <div class="start-icon">🧭</div>
        <button class="start-btn" id="startBtn">Начать калибровку</button>
        <div class="start-hint">Для расчета траектории нужен доступ к геопозиции и гироскопу</div>
    </div>

    <!-- Основной интерфейс -->
    <div class="display-header">
        <div class="date-label" id="dateLabel">Наведитесь</div>
        <div class="time-value" id="timeValue"></div>
    </div>

    <div class="compass-viewport" id="compassViewport">
        <div class="target-line" id="targetLine"></div>
        <div class="sun-marker" id="sunMarker"></div>
        <div class="center-dot"></div>
        
        <svg class="compass-svg" id="compassSvg" viewBox="0 0 300 300">
            <circle cx="150" cy="150" r="142" stroke="rgba(255,255,255,0.08)" stroke-width="1" fill="none"/>
            <circle cx="150" cy="150" r="125" stroke="rgba(255,255,255,0.04)" stroke-width="1" fill="none"/>
            <g id="ticksGroup"></g>
            <text x="150" y="42" fill="#ffd25f" font-size="13" font-weight="600" text-anchor="middle">N</text>
            <text x="262" y="154" fill="rgba(255,255,255,0.4)" font-size="13" font-weight="500" text-anchor="middle">E</text>
            <text x="150" y="268" fill="rgba(255,255,255,0.4)" font-size="13" font-weight="500" text-anchor="middle">S</text>
            <text x="38" y="154" fill="rgba(255,255,255,0.4)" font-size="13" font-weight="500" text-anchor="middle">W</text>
        </svg>
    </div>

    <div class="footer-meta">
        <div class="location-name" id="locationLabel">—</div>
    </div>

    <script>
        // Отрисовка рисок компаса
        const ticksGroup = document.getElementById('ticksGroup');
        for (let i = 0; i < 360; i += 5) {
            const isMajor = i % 30 === 0;
            const r1 = 142;
            const r2 = r1 - (isMajor ? 10 : 5);
            const rad = (i - 90) * Math.PI / 180;
            
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', 150 + r1 * Math.cos(rad));
            line.setAttribute('y1', 150 + r1 * Math.sin(rad));
            line.setAttribute('x2', 150 + r2 * Math.cos(rad));
            line.setAttribute('y2', 150 + r2 * Math.sin(rad));
            line.setAttribute('stroke', isMajor ? 'rgba(255,255,255,0.3)' : 'rgba(255,255,255,0.1)');
            line.setAttribute('stroke-width', isMajor ? '1.5' : '1');
            ticksGroup.appendChild(line);
        }

        // Переменные
        const dateLabel = document.getElementById('dateLabel');
        const timeValue = document.getElementById('timeValue');
        const locationLabel = document.getElementById('locationLabel');
        const compassSvg = document.getElementById('compassSvg');
        const compassViewport = document.getElementById('compassViewport');
        const sunMarker = document.getElementById('sunMarker');
        const targetLine = document.getElementById('targetLine');
        
        const startOverlay = document.getElementById('startOverlay');
        const startBtn = document.getElementById('startBtn');

        let userLat = null;
        let userLon = null;
        let currentHeading = 0;
        let lastRawHeading = 0;
        let unwrappedHeading = 0;
        let motionTimer = null;
        let isSearching = false;

        // Инициализация по тапу (Критично для iOS Safari/PWA)
        startBtn.addEventListener('click', async () => {
            startBtn.textContent = 'Инициализация...';
            startBtn.style.pointerEvents = 'none';

            let orientationGranted = false;

            // 1. Запрос Гироскопа
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const state = await DeviceOrientationEvent.requestPermission();
                    if (state === 'granted') {
                        orientationGranted = true;
                        window.addEventListener('deviceorientation', handleOrientation, true);
                    } else {
                        startBtn.textContent = 'Отказано в доступе';
                        return; // Без компаса не продолжаем
                    }
                } catch (e) {
                    console.error(e);
                    startBtn.textContent = 'Ошибка компаса';
                    return;
                }
            } else {
                orientationGranted = true;
                window.addEventListener('deviceorientation', handleOrientation, true);
            }

            // 2. Запрос Геолокации
            if (navigator.geolocation && orientationGranted) {
                navigator.geolocation.getCurrentPosition(
                    pos => {
                        userLat = pos.coords.latitude;
                        userLon = pos.coords.longitude;
                        reverseGeocode(userLat, userLon);
                        startOverlay.classList.add('hidden'); // Убираем шторку
                    },
                    err => {
                        // Фолбэк если не дали локацию
                        userLat = 55.7558;
                        userLon = 37.6173;
                        locationLabel.textContent = 'Демо: Москва';
                        startOverlay.classList.add('hidden');
                    },
                    { enableHighAccuracy: true, timeout: 6000 }
                );
            }
        });

        // Астрономия (NOAA)
        const toRad = d => d * Math.PI / 180;
        const toDeg = r => r * 180 / Math.PI;
        function getJulianDate(date) { return (date.getTime() / 1000 / 86400.0) + 2440587.5; }

        function getSolarPosition(jd, lat, lon) {
            const d = jd - 2451545.0;
            const g = (357.529 + 0.98560028 * d) % 360;
            const q = (280.459 + 0.98564736 * d) % 360;
            const L = (q + 1.915 * Math.sin(toRad(g)) + 0.020 * Math.sin(toRad(2 * g))) % 360;
            const e = 23.439 - 0.00000036 * d;

            const alpha = toDeg(Math.atan2(Math.cos(toRad(e)) * Math.sin(toRad(L)), Math.cos(toRad(L))));
            const delta = toDeg(Math.asin(Math.sin(toRad(e)) * Math.sin(toRad(L))));

            const gmst = (280.46061837 + 360.98564736629 * d) % 360;
            let hourAngle = (gmst + lon - alpha) % 360;
            hourAngle = (hourAngle + 360) % 360;

            const sinAlt = Math.sin(toRad(lat)) * Math.sin(toRad(delta)) +
                Math.cos(toRad(lat)) * Math.cos(toRad(delta)) * Math.cos(toRad(hourAngle));
            const altitude = toDeg(Math.asin(Math.max(-1, Math.min(1, sinAlt))));

            let azimuth = toDeg(Math.atan2(
                -Math.sin(toRad(hourAngle)),
                Math.cos(toRad(lat)) * Math.tan(toRad(delta)) - Math.sin(toRad(lat)) * Math.cos(toRad(hourAngle))
            ));
            return { azimuth: (azimuth + 360) % 360, altitude };
        }

        function findSolarPassage(targetAzimuth, lat, lon) {
            const now = new Date();
            const startJd = getJulianDate(now);
            for (let day = 0; day < 365; day++) {
                const dayJd = startJd + day;
                for (let h = 0; h < 24; h += 1) {
                    const jd = dayJd + (h / 24);
                    const pos = getSolarPosition(jd, lat, lon);
                    if (pos.altitude > 0) {
                        let dAz = Math.abs(pos.azimuth - targetAzimuth);
                        if (Math.min(dAz, 360 - dAz) < 7.5) {
                            return refinePassage(jd - (1/24), jd + (1/24), targetAzimuth, lat, lon);
                        }
                    }
                }
            }
            return null;
        }

        function refinePassage(lo, hi, targetAzimuth, lat, lon) {
            for (let i = 0; i < 12; i++) {
                const mid = (lo + hi) / 2;
                const pMid = getSolarPosition(mid, lat, lon);
                let dMid = Math.abs(pMid.azimuth - targetAzimuth);
                if (dMid > 180) dMid = 360 - dMid;

                const pLo = getSolarPosition(lo, lat, lon);
                let dLo = Math.abs(pLo.azimuth - targetAzimuth);
                if (dLo > 180) dLo = 360 - dLo;

                dLo < dMid ? (hi = mid) : (lo = mid);
            }
            return new Date(((lo + hi) / 2 - 2440587.5) * 86400 * 1000);
        }

        function formatResult(date) {
            if (!date) return { dateStr: 'Вне орбиты', timeStr: '' };
            const diffDays = Math.floor((date.setHours(0,0,0,0) - new Date().setHours(0,0,0,0)) / 86400000);
            const timeStr = date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            if (diffDays === 0) return { dateStr: 'Сегодня', timeStr };
            if (diffDays === 1) return { dateStr: 'Завтра', timeStr };
            return { dateStr: date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' }), timeStr };
        }

        // Логика компаса и UI
        function handleOrientation(e) {
            let heading = e.webkitCompassHeading || (e.alpha !== null ? 360 - e.alpha : null);
            if (heading !== null) {
                requestAnimationFrame(() => onHeadingChange((heading + 360) % 360));
            }
        }

        function onHeadingChange(heading) {
            let diff = heading - lastRawHeading;
            if (diff < -180) diff += 360;
            if (diff > 180) diff -= 360;
            unwrappedHeading += diff;
            lastRawHeading = heading;
            currentHeading = heading;

            compassSvg.style.transform = `rotate(${-unwrappedHeading}deg)`;
            sunMarker.style.transform = `translateX(-50%) rotate(${unwrappedHeading}deg)`;

            compassViewport.classList.remove('locked');
            sunMarker.classList.remove('active');
            targetLine.classList.remove('active');

            if (!isSearching) {
                dateLabel.textContent = 'Наведитесь';
                timeValue.textContent = '';
                timeValue.classList.remove('dots');
            }

            clearTimeout(motionTimer);
            motionTimer = setTimeout(executeSearch, 400);
        }

        function executeSearch() {
            if (userLat === null) return; // Теперь это не сработает вхолостую
            isSearching = true;
            dateLabel.textContent = '';
            timeValue.textContent = '···';
            timeValue.classList.add('dots');

            setTimeout(() => {
                const passageDate = findSolarPassage(currentHeading, userLat, userLon);
                const { dateStr, timeStr } = formatResult(passageDate);
                dateLabel.textContent = dateStr;
                timeValue.classList.remove('dots');
                timeValue.textContent = timeStr;

                if (passageDate) {
                    compassViewport.classList.add('locked');
                    sunMarker.classList.add('active');
                    targetLine.classList.add('active');
                }
                isSearching = false;
            }, 200);
        }

        function reverseGeocode(lat, lon) {
            locationLabel.textContent = `${lat.toFixed(2)}°, ${lon.toFixed(2)}°`;
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=ru`)
                .then(r => r.json())
                .then(data => {
                    const city = data.address.city || data.address.town || data.address.settlement;
                    if (city) locationLabel.textContent = city;
                }).catch(() => {});
        }
    </script>
</body>
</html>
