<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Солнечный компас</title>
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <link rel="apple-touch-icon" href="icon-192.png">

    <!-- Полный исходник SunCalc 2.0.1 (MIT) -->
    <script>
        (function () {
            'use strict';

            var PI = Math.PI,
                sin = Math.sin,
                cos = Math.cos,
                tan = Math.tan,
                asin = Math.asin,
                atan2 = Math.atan2;

            var rad = PI / 180,
                dayMs = 1000 * 60 * 60 * 24,
                J1970 = 2440588,
                J2000 = 2451545;

            function toJulian(date) { return date.valueOf() / dayMs - 0.5 + J1970; }
            function fromJulian(j) { return new Date((j + 0.5 - J1970) * dayMs); }
            function toDays(date) { return toJulian(date) - J2000; }

            var e = rad * 23.4397;

            function rightAscension(l, b) { return atan2(sin(l) * cos(e) - tan(b) * sin(e), cos(l)); }
            function declination(l, b) { return asin(sin(b) * cos(e) + cos(b) * sin(e) * sin(l)); }

            function azimuth(H, phi, dec) { return atan2(sin(H), cos(H) * sin(phi) - tan(dec) * cos(phi)); }
            function altitude(H, phi, dec) { return asin(sin(phi) * sin(dec) + cos(phi) * cos(dec) * cos(H)); }

            function siderealTime(d, lw) { return rad * (280.16 + 360.9856235 * d) - lw; }

            function astroRefraction(h) {
                if (h < 0) h = 0;
                return 0.0002967 / tan(h + 0.00312536 / (h + 0.08901179));
            }

            function solarMeanAnomaly(d) { return rad * (357.5291 + 0.98560028 * d); }
            function eclipticLongitude(M) {
                var C = rad * (1.9148 * sin(M) + 0.02 * sin(2 * M) + 0.0003 * sin(3 * M));
                var P = rad * 102.9372;
                return M + C + P + PI;
            }

            function sunCoords(d) {
                var M = solarMeanAnomaly(d),
                    L = eclipticLongitude(M);
                return {
                    dec: declination(L, 0),
                    ra: rightAscension(L, 0)
                };
            }

            var SunCalc = {};

            SunCalc.getPosition = function (date, lat, lng) {
                var lw = rad * -lng,
                    phi = rad * lat,
                    d = toDays(date),
                    c = sunCoords(d),
                    H = siderealTime(d, lw) - c.ra;

                return {
                    azimuth: azimuth(H, phi, c.dec),
                    altitude: altitude(H, phi, c.dec)
                };
            };

            var times = [
                [-0.833, 'sunrise', 'sunset'],
                [-0.3, 'sunriseEnd', 'sunsetStart'],
                [-6, 'dawn', 'dusk'],
                [-12, 'nauticalDawn', 'nauticalDusk'],
                [-18, 'nightEnd', 'night'],
                [6, 'goldenHourEnd', 'goldenHour']
            ];

            SunCalc.addTime = function (angle, riseName, setName) {
                times.push([angle, riseName, setName]);
            };

            var J0 = 0.0009;

            function julianCycle(d, lw) { return Math.round(d - J0 - lw / (2 * PI)); }
            function approxTransit(Ht, lw, n) { return J0 + (Ht + lw) / (2 * PI) + n; }
            function solarTransitJ(ds, M, L) { return J2000 + ds + 0.0053 * sin(M) - 0.0069 * sin(2 * L); }
            function hourAngle(h, phi, d) { return Math.acos((sin(h) - sin(phi) * sin(d)) / (cos(phi) * cos(d))); }

            function getSetJ(h, lw, phi, dec, n, M, L) {
                var w = hourAngle(h, phi, dec),
                    a = approxTransit(w, lw, n);
                return solarTransitJ(a, M, L);
            }

            SunCalc.getTimes = function (date, lat, lng) {
                var lw = rad * -lng,
                    phi = rad * lat,
                    d = toDays(date),
                    n = julianCycle(d, lw),
                    ds = approxTransit(0, lw, n),
                    M = solarMeanAnomaly(ds),
                    L = eclipticLongitude(M),
                    dec = declination(L, 0),
                    Jnoon = solarTransitJ(ds, M, L),
                    i, len, time, Jset, Jrise,
                    result = {
                        solarNoon: fromJulian(Jnoon),
                        nadir: fromJulian(Jnoon - 0.5)
                    };

                for (i = 0, len = times.length; i < len; i += 1) {
                    time = times[i];
                    Jset = getSetJ(time[0] * rad, lw, phi, dec, n, M, L);
                    Jrise = Jnoon - (Jset - Jnoon);
                    result[time[1]] = fromJulian(Jrise);
                    result[time[2]] = fromJulian(Jset);
                }
                return result;
            };

            window.SunCalc = SunCalc;
        }());
    </script>

    <style>
        :root {
            --bg: #050505;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.45);
            --accent-sun: #ffd25f;
            --accent-glow: rgba(255, 210, 95, 0.4);
            --surface: rgba(255, 255, 255, 0.08);
            --surface-border: rgba(255, 255, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: calc(env(safe-area-inset-top) + 20px) 24px calc(env(safe-area-inset-bottom) + 32px);
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body::before {
            content: "";
            position: absolute;
            width: 420px;
            height: 420px;
            background: radial-gradient(circle, rgba(255, 210, 95, 0.05) 0%, rgba(0,0,0,0) 70%);
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
        }

        .start-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .start-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .start-btn {
            background: var(--surface);
            border: 1px solid var(--surface-border);
            color: var(--text-primary);
            padding: 18px 42px;
            border-radius: 100px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .start-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.18);
        }

        .display-header {
            position: relative;
            z-index: 1;
            text-align: center;
            margin-top: 10px;
            min-height: 110px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .date-label {
            font-size: 18px;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: -0.2px;
            min-height: 24px;
        }

        .time-value {
            font-size: 72px;
            font-weight: 100;
            letter-spacing: -3px;
            line-height: 1;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
            margin-top: 4px;
            min-height: 72px;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .time-value.dots {
            font-size: 40px;
            font-weight: 200;
            letter-spacing: 6px;
            color: var(--text-secondary);
        }

        .compass-viewport {
            position: relative;
            z-index: 1;
            width: 340px;
            height: 340px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .compass-viewport.locked {
            transform: scale(1.04);
        }

        .viewport-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 10px;
            background: var(--accent-sun);
            z-index: 5;
            box-shadow: 0 0 8px var(--accent-sun);
        }

        .compass-svg {
            width: 100%;
            height: 100%;
            will-change: transform;
            transition: transform 0.1s linear;
        }

        .center-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            background: var(--text-primary);
            border-radius: 50%;
            z-index: 4;
            box-shadow: 0 0 8px rgba(255,255,255,0.8);
        }

        .footer-meta {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            width: 100%;
        }

        .shutter-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.85);
            background: transparent;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            transition: border-color 0.3s ease, transform 0.15s ease;
        }

        .shutter-btn:active {
            transform: scale(0.93);
        }

        .shutter-inner {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: #ffffff;
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        background-color 0.25s ease, 
                        border-radius 0.25s ease,
                        box-shadow 0.25s ease;
        }

        .shutter-btn.active {
            border-color: var(--accent-sun);
        }

        .shutter-btn.active .shutter-inner {
            background: var(--accent-sun);
            box-shadow: 0 0 20px var(--accent-glow);
            transform: scale(0.72);
            border-radius: 14px;
        }

        .location-name {
            font-size: 13px;
            font-weight: 400;
            color: var(--text-secondary);
            letter-spacing: 0.2px;
        }

        .build-number {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: rgba(255, 255, 255, 0.15);
            font-weight: 500;
            letter-spacing: 0.5px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="start-overlay" id="startOverlay">
        <button class="start-btn" id="startBtn">Включить компас</button>
    </div>

    <div class="display-header">
        <div class="date-label" id="dateLabel"></div>
        <div class="time-value" id="timeValue"></div>
    </div>

    <div class="compass-viewport" id="compassViewport">
        <div class="viewport-notch"></div>
        <div class="center-dot"></div>
        
        <svg class="compass-svg" id="compassSvg" viewBox="0 0 340 340">
            <circle cx="170" cy="170" r="160" stroke="rgba(255,255,255,0.08)" stroke-width="1" fill="none"/>
            <circle cx="170" cy="170" r="115" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="2 4" fill="none"/>
            
            <g id="ticksGroup"></g>

            <text x="170" y="32" fill="#ffd25f" font-size="14" font-weight="600" text-anchor="middle">N</text>
            <text x="316" y="174" fill="rgba(255,255,255,0.4)" font-size="14" font-weight="500" text-anchor="middle">E</text>
            <text x="170" y="320" fill="rgba(255,255,255,0.4)" font-size="14" font-weight="500" text-anchor="middle">S</text>
            <text x="24" y="174" fill="rgba(255,255,255,0.4)" font-size="14" font-weight="500" text-anchor="middle">W</text>

            <circle id="currentSunDot" cx="170" cy="50" r="5" fill="#ffffff" filter="drop-shadow(0 0 6px rgba(255,255,255,0.9))" style="display: none;" />
            <circle id="targetSunDot" cx="170" cy="10" r="7" fill="#ffd25f" filter="drop-shadow(0 0 10px #ffd25f)" style="display: none;" />
        </svg>
    </div>

    <div class="footer-meta">
        <button class="shutter-btn" id="calcBtn" aria-label="Сделать замер">
            <div class="shutter-inner"></div>
        </button>
        <div class="location-name" id="locationLabel">Определение...</div>
    </div>

    <div class="build-number">Build 1.2.2</div>

    <script>
        console.log('Script loaded successfully');
        console.log('SunCalc defined:', !!window.SunCalc);

        // ==================== РЕНДЕР КОМПАСА (ИСПРАВЛЕННЫЙ ЦЕНТР 170) ====================
        const ticksGroup = document.getElementById('ticksGroup');
        const cx = 170, cy = 170;
        const r1 = 160;
        const r2_major = r1 - 12;
        const r2_minor = r1 - 6;

        for (let i = 0; i < 360; i += 5) {
            const isMajor = i % 30 === 0;
            const r2 = isMajor ? r2_major : r2_minor;
            const rad = (i - 90) * Math.PI / 180;
            
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', cx + r1 * Math.cos(rad));
            line.setAttribute('y1', cy + r1 * Math.sin(rad));
            line.setAttribute('x2', cx + r2 * Math.cos(rad));
            line.setAttribute('y2', cy + r2 * Math.sin(rad));
            line.setAttribute('stroke', isMajor ? 'rgba(255,255,255,0.3)' : 'rgba(255,255,255,0.1)');
            line.setAttribute('stroke-width', isMajor ? '1.5' : '1');
            ticksGroup.appendChild(line);
        }

        const dateLabel = document.getElementById('dateLabel');
        const timeValue = document.getElementById('timeValue');
        const locationLabel = document.getElementById('locationLabel');
        const compassSvg = document.getElementById('compassSvg');
        const compassViewport = document.getElementById('compassViewport');
        const currentSunDot = document.getElementById('currentSunDot');
        const targetSunDot = document.getElementById('targetSunDot');
        const calcBtn = document.getElementById('calcBtn');
        const startOverlay = document.getElementById('startOverlay');
        const startBtn = document.getElementById('startBtn');

        let userLat = null;
        let userLon = null;
        let currentHeading = 0;
        let lastRawHeading = 0;
        let unwrappedHeading = 0;
        let isLocked = false;
        let isCalculating = false;
        let needSyncAfterUnlock = false;
        let currentSunAzimuth = 0;
        let targetAzimuth = null;

        // ==================== SUNCalc ====================
        function getSolarPosition(date, lat, lon) {
            if (!lat || !lon || isNaN(lat) || isNaN(lon) || !window.SunCalc) 
                return { azimuth: 0, altitude: -90 };
            try {
                const pos = window.SunCalc.getPosition(date, lat, lon);
                let azimuth = pos.azimuth * (180 / Math.PI);
                azimuth = (azimuth + 180) % 360;
                azimuth = (azimuth + 360) % 360;
                
                const altitude = pos.altitude * (180 / Math.PI);
                return { azimuth, altitude };
            } catch (e) {
                console.error('SunCalc error:', e);
                return { azimuth: 0, altitude: -90 };
            }
        }

        const angDiff = (a, b) => {
            let d = Math.abs(a - b) % 360;
            return Math.min(d, 360 - d);
        };

        function setSvgDotPosition(dotElement, azimuth, radius) {
            const rad = (azimuth - 90) * Math.PI / 180;
            const dcx = 170 + radius * Math.cos(rad);
            const dcy = 170 + radius * Math.sin(rad);
            dotElement.setAttribute('cx', dcx);
            dotElement.setAttribute('cy', dcy);
        }

        function updateCurrentSunPosition() {
            if (userLat === null || userLon === null) return;
            const now = new Date();
            const pos = getSolarPosition(now, userLat, userLon);
            currentSunAzimuth = pos.azimuth;

            currentSunDot.style.display = 'block';
            if (pos.altitude <= -6) {
                currentSunDot.setAttribute('opacity', '0.15');
            } else if (pos.altitude < 0) {
                currentSunDot.setAttribute('opacity', '0.4');
            } else {
                currentSunDot.setAttribute('opacity', '1');
            }
            setSvgDotPosition(currentSunDot, currentSunAzimuth, 100);
        }

        function findSolarPassage(targetAzimuth, lat, lon) {
            const now = new Date();
            let checkDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());

            for (let day = 0; day < 40; day++) {
                for (let min = 0; min < 1440; min += 3) {
                    const testDate = new Date(checkDate.getTime() + min * 60000);
                    if (testDate < now) continue;

                    const pos = getSolarPosition(testDate, lat, lon);
                    
                    if (angDiff(pos.azimuth, targetAzimuth) < 5) {
                        let bestDate = testDate;
                        let minDiff = Infinity;
                        for (let f = -20; f <= 20; f += 1) {
                            const fineDate = new Date(testDate.getTime() + f * 60000);
                            const fPos = getSolarPosition(fineDate, lat, lon);
                            const diff = angDiff(fPos.azimuth, targetAzimuth);
                            if (diff < minDiff) {
                                minDiff = diff;
                                bestDate = fineDate;
                            }
                        }
                        return bestDate;
                    }
                }
                checkDate.setDate(checkDate.getDate() + 1);
            }
            return null;
        }

        function formatResult(date) {
            if (!date) return { dateStr: 'Не найдено в ближайшие 40 дней', timeStr: '—' };

            const timeStr = date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            const dTarget = new Date(date); dTarget.setHours(0,0,0,0);
            const dNow = new Date(); dNow.setHours(0,0,0,0);
            const diffDays = Math.round((dTarget - dNow) / 86400000);

            let dateStr = '';
            if (diffDays === 0) dateStr = 'Сегодня';
            else if (diffDays === 1) dateStr = 'Завтра';
            else dateStr = date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' });

            return { dateStr, timeStr };
        }

        // ==================== Компас и сенсоры ====================
        function handleOrientation(e) {
            let heading = e.webkitCompassHeading || (e.alpha !== null ? 360 - e.alpha : null);
            if (heading !== null) {
                requestAnimationFrame(() => {
                    if (needSyncAfterUnlock) {
                        unwrappedHeading = heading;
                        lastRawHeading = heading;
                        needSyncAfterUnlock = false;
                    }
                    onHeadingChange(heading);
                });
            }
        }

        function onHeadingChange(heading) {
            if (isLocked) return;

            let diff = heading - lastRawHeading;
            if (diff < -180) diff += 360;
            if (diff > 180) diff -= 360;
            unwrappedHeading += diff;
            lastRawHeading = heading;
            currentHeading = heading;

            compassSvg.style.transform = `rotate(${-unwrappedHeading}deg)`;
        }

        function resetLock() {
            isLocked = false;
            isCalculating = false;
            targetAzimuth = null;
            needSyncAfterUnlock = true;
            compassViewport.classList.remove('locked');
            targetSunDot.style.display = 'none';
            calcBtn.classList.remove('active');
            dateLabel.textContent = '';
            updateClock();
            timeValue.classList.remove('dots');
            updateCurrentSunPosition();
        }

        function executeCalculation() {
            if (userLat === null || isCalculating || isLocked) return;
            isCalculating = true;
            isLocked = true;
            targetAzimuth = currentHeading;

            dateLabel.textContent = '';
            timeValue.textContent = '···';
            timeValue.classList.add('dots');

            setTimeout(() => {
                const passageDate = findSolarPassage(targetAzimuth, userLat, userLon);
                const { dateStr, timeStr } = formatResult(passageDate);

                dateLabel.textContent = dateStr;
                timeValue.classList.remove('dots');
                timeValue.textContent = timeStr;

                setSvgDotPosition(targetSunDot, targetAzimuth, 140);
                targetSunDot.style.display = 'block';

                compassViewport.classList.add('locked');
                calcBtn.classList.add('active');
                isCalculating = false;
            }, 100);
        }

        function toggleLock() {
            if (isCalculating) return;
            if (isLocked) resetLock();
            else executeCalculation();
        }

        // ==================== Живые часы с плавной анимацией ====================
        function updateClock() {
            if (!isLocked) {
                const now = new Date();
                const timeStr = now.toLocaleTimeString('ru-RU', {
                    hour: '2-digit', minute: '2-digit'
                }).replace(':', ' ');
                
                if (timeValue.textContent !== timeStr) {
                    timeValue.style.opacity = '0';
                    timeValue.style.transform = 'translateY(10px)';
                    setTimeout(() => {
                        timeValue.textContent = timeStr;
                        timeValue.style.opacity = '1';
                        timeValue.style.transform = 'translateY(0)';
                    }, 200);
                }
            }
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ==================== Запуск с защитой от зависания ====================
        startBtn.addEventListener('click', async () => {
            startBtn.textContent = 'Подключение...';
            startBtn.style.pointerEvents = 'none';

            let permissionGranted = true;

            async function requestOrientationWithTimeout() {
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    let timeoutId;
                    try {
                        const permissionPromise = DeviceOrientationEvent.requestPermission();
                        const timeoutPromise = new Promise((_, reject) => 
                            timeoutId = setTimeout(() => reject(new Error('Permission timeout')), 3000)
                        );
                        
                        const state = await Promise.race([permissionPromise, timeoutPromise]);
                        clearTimeout(timeoutId);

                        if (state !== 'granted') {
                            alert('Доступ к компасу запрещён. Приложение не сможет работать.');
                            permissionGranted = false;
                        } else {
                            window.addEventListener('deviceorientation', handleOrientation, true);
                        }
                    } catch (e) {
                        clearTimeout(timeoutId);
                        console.warn('Orientation permission timeout or error, applying fallback:', e);
                        window.addEventListener('deviceorientation', handleOrientation, true);
                    }
                } else {
                    window.addEventListener('deviceorientation', handleOrientation, true);
                }
            }

            await requestOrientationWithTimeout();

            if (!permissionGranted) {
                startBtn.textContent = 'Включить компас';
                startBtn.style.pointerEvents = 'auto';
                return;
            }

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => {
                        userLat = pos.coords.latitude;
                        userLon = pos.coords.longitude;
                        reverseGeocode(userLat, userLon);
                        updateCurrentSunPosition();
                        startOverlay.classList.add('hidden');
                    },
                    err => {
                        console.warn('Geolocation error:', err);
                        userLat = 55.7558;
                        userLon = 37.6173;
                        locationLabel.textContent = 'Москва (Демо)';
                        updateCurrentSunPosition();
                        startOverlay.classList.add('hidden');
                    },
                    { enableHighAccuracy: true, timeout: 8000, maximumAge: 60000 }
                );
            } else {
                userLat = 55.7558; 
                userLon = 37.6173;
                locationLabel.textContent = 'Москва (Демо)';
                updateCurrentSunPosition();
                startOverlay.classList.add('hidden');
            }
        });

        function reverseGeocode(lat, lon) {
            const cacheKey = `city_${lat.toFixed(3)}_${lon.toFixed(3)}`;
            const cachedCity = localStorage.getItem(cacheKey);

            if (cachedCity) {
                locationLabel.textContent = cachedCity;
                return;
            }

            locationLabel.textContent = `${lat.toFixed(2)}°, ${lon.toFixed(2)}°`;
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=ru`, {
                headers: { 'User-Agent': 'SolarCompass/1.0 (https://github.com/alexeynovopashin-lab/solar_compass)' }
            })
            .then(r => r.json())
            .then(data => {
                const city = data.address.city || data.address.town || data.address.settlement || data.address.country;
                if (city) {
                    locationLabel.textContent = city;
                    localStorage.setItem(cacheKey, city);
                }
            }).catch(() => {});
        }

        calcBtn.addEventListener('click', toggleLock);
        compassViewport.addEventListener('click', toggleLock);

        setInterval(updateCurrentSunPosition, 30000);
    </script>
</body>
</html>
